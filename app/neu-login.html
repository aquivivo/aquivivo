<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>NEU Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/" />
    <link rel="icon" type="image/png" href="assets/img/logo-aquivivo.png?v=20260308favicon1" />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Bebas+Neue&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/neu-shell.css?v=20260326h1" />
    <link rel="stylesheet" href="assets/css/neu-theme.css?v=20260326e" />
    <link rel="stylesheet" href="assets/css/neu-auth.css?v=20260326g" />
    <script src="assets/js/neu-layout.js?v=20260327b1" type="module"></script>
  </head>
  <body data-page="neu-login" data-no-side-panel="1" class="neu-auth-page no-side-panel">
    <div id="appHeader"></div>

    <main class="page neu-auth-main">
      <div class="container">
        <section class="neu-auth-wrap">
          <article class="neu-auth-card">
            <header class="neu-auth-head">
              <h1 class="neu-auth-title" id="neuAuthTitle">Inicia sesi&oacute;n en neu</h1>
              <p class="neu-auth-sub" id="neuAuthSubtitle">
                Accede para continuar en la aplicaci&oacute;n neu.
              </p>
            </header>

            <div class="neu-auth-mode">
              <button class="neu-auth-mode-btn is-active" id="neuModeLogin" type="button">Inicia sesi&oacute;n</button>
              <button class="neu-auth-mode-btn" id="neuModeRegister" type="button">Crear cuenta</button>
            </div>

            <form class="neu-auth-form" id="neuAuthForm" novalidate>
              <label class="neu-auth-label" for="neuEmail">
                Email
                <input
                  id="neuEmail"
                  class="neu-auth-input"
                  type="email"
                  autocomplete="email"
                  placeholder="tu@email.com"
                  required
                />
              </label>

              <label class="neu-auth-label" for="neuPassword">
                Contrase&ntilde;a
                <input
                  id="neuPassword"
                  class="neu-auth-input"
                  type="password"
                  autocomplete="current-password"
                  placeholder="M&iacute;nimo 6 caracteres"
                  required
                />
              </label>

              <div class="neu-auth-pass-tools">
                <button
                  class="neu-auth-link neu-auth-password-toggle"
                  id="neuTogglePassword"
                  type="button"
                  aria-pressed="false"
                >
                  &#128065; Mostrar
                </button>
              </div>

              <div class="neu-auth-actions">
                <button class="btn-yellow neu-auth-submit" id="neuSubmitBtn" type="submit">
                  Inicia sesi&oacute;n
                </button>
                <div class="neu-auth-divider" aria-hidden="true"><span>o</span></div>
                <button class="btn-white-outline neu-auth-google" id="neuGoogleBtn" type="button">
                  Continuar con Google
                </button>
              </div>

              <div class="neu-auth-switch-row">
                <button class="neu-auth-link" id="neuToggleMode" type="button">
                  &iquest;No tienes cuenta? Crear cuenta
                </button>
              </div>

              <button class="neu-auth-link" id="neuResetBtn" type="button">
                Olvid&eacute; mi contrase&ntilde;a
              </button>
              <p class="neu-auth-message" id="neuAuthMessage"></p>
            </form>
          </article>
        </section>
      </div>
    </main>

    <div id="appFooter"></div>

    <script type="module" src="assets/js/neu-auth.js?v=20260222e"></script>
  </body>
</html>
