<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redirecting...</title>
    <meta http-equiv="refresh" content="0; url=app/index.html" />
    <script>
      (function () {
        var path = window.location.pathname || '';
        var base = '';
        if (path.indexOf('/aquivivo/') !== -1) base = '/aquivivo';
        window.location.replace(base + '/app/index.html');
      })();
    </script>
  </head>
  <body></body>
</html>
